name: Update NBA Scoreboard

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch today
        run: |
          mkdir -p data
          curl -s -H "User-Agent: Mozilla/5.0" -H "Referer: https://www.nba.com/" "https://cdn.nba.com/static/json/liveData/scoreboard/todaysScoreboard_00.json" -o /tmp/t.json || echo "{}" > /tmp/t.json
          python3 -c "import json,sys; d=json.load(open('/tmp/t.json')); d['fetched_at']='$(date -u +%Y-%m-%dT%H:%M:%SZ)'; open('data/scoreboard-data.js','w').write('var NBA_SCOREBOARD='+json.dumps(d)+';')" 2>/dev/null || true

      - name: Fetch yesterday
        run: |
          curl -s -H "User-Agent: Mozilla/5.0" -H "Referer: https://www.nba.com/" "https://cdn.nba.com/static/json/liveData/scoreboard/scoreboard_1.json" -o /tmp/y.json || echo "{}" > /tmp/y.json
          python3 -c "import json,sys; d=json.load(open('/tmp/y.json')); d['fetched_at']='$(date -u +%Y-%m-%dT%H:%M:%SZ)'; open('data/scoreboard-yesterday.js','w').write('var NBA_SCOREBOARD='+json.dumps(d)+';')" 2>/dev/null || true

      - name: Fetch tomorrow
        run: |
          curl -s -H "User-Agent: Mozilla/5.0" -H "Referer: https://www.nba.com/" "https://cdn.nba.com/static/json/liveData/scoreboard/scoreboard_2.json" -o /tmp/tm.json || echo "{}" > /tmp/tm.json
          python3 -c "import json,sys; d=json.load(open('/tmp/tm.json')); d['fetched_at']='$(date -u +%Y-%m-%dT%H:%M:%SZ)'; open('data/scoreboard-tomorrow.js','w').write('var NBA_SCOREBOARD='+json.dumps(d)+';')" 2>/dev/null || true

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --cached --quiet && exit 0
          git commit -m "chore: scoreboard $(date -u '+%H:%M UTC')"
          git push
