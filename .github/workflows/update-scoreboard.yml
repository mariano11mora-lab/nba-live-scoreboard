name: Update NBA Scoreboard

on:
  schedule:
    - cron: "*/2 * * * *"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Create data folder
        run: mkdir -p data

      - name: Fetch NBA data
        run: |
          curl -s https://cdn.nba.com/static/json/liveData/scoreboard/todaysScoreboard_00.json > data/scoreboard.json

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data/scoreboard.json
          git commit -m "update scoreboard" || echo "no changes"
          git push
