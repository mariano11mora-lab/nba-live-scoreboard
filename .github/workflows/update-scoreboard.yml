name: Update NBA Scoreboard
on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:
permissions:
  contents: write
jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install nba_api
        run: pip install nba_api --break-system-packages -q

      - name: Fetch scoreboards
        run: python3 fetch_scores.py

      - name: Force commit (always, to bust GitHub Pages cache)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          # Siempre hacer commit aunque no haya cambios, usando --allow-empty
          git diff --cached --quiet && git commit --allow-empty -m "chore: scoreboard $(date -u '+%Y-%m-%d %H:%M UTC')" || git commit -m "chore: scoreboard $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
